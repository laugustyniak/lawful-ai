name: Update README

on:
  push:
    branches: [main]
    paths: ['briefs/**']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Update README
        run: node scripts/update-readme.mjs
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md feed.json
          git diff --staged --quiet || git commit -m "chore: update README and feeds"
          git push
