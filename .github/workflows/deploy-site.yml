name: Deploy Site

on:
  push:
    branches: [main]
    paths: ['briefs/**', 'site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate feeds
        run: node scripts/generate-feed.mjs
      - name: Install site deps
        working-directory: site
        run: npm install
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Copy feeds to dist
        run: |
          cp -f feed.json site/dist/feed.json 2>/dev/null || true
          cp -f feed.xml site/dist/feed.xml 2>/dev/null || true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
